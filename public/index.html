<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WhatsApp Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title">WhatsApp</div>
      <div class="top-actions">
        <button class="icon-btn" type="button" aria-label="Camera">⌁</button>
        <button class="icon-btn" type="button" aria-label="Menu">⋮</button>
      </div>
    </header>

    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input id="chatSearch" type="text" placeholder="Ask Meta AI or Search" />
      </div>
    </div>

    <div class="tabs">
      <button class="tab active">Chats <span id="unreadBadge" class="badge">0</span></button>
      <button class="tab">Updates</button>
      <button class="tab">Communities</button>
      <button class="tab">Calls</button>
    </div>

    <main class="main">
      <section id="listView" class="list-view">
        <div class="status-card">
          <div>
            <div class="status-label">Connection</div>
            <div id="statusText" class="status-text">Connecting...</div>
          </div>
          <div id="connectionDot" class="dot offline"></div>
        </div>

        <div id="qrPanel" class="qr-panel">
          <div class="qr-head">
            <span>QR Login</span>
            <button id="refreshQrBtn" class="link-btn" type="button">Refresh</button>
          </div>
          <div class="qr-box">
            <img id="qrImage" alt="QR code" />
            <div id="qrPlaceholder" class="qr-placeholder">Waiting for QR...</div>
          </div>
          <div id="qrHelp" class="qr-help">Scan this QR in WhatsApp → Linked devices</div>
        </div>

        <div class="list-head">
          <span>Chats</span>
          <button id="manualRefreshBtn" class="link-btn" type="button">Refresh</button>
        </div>

        <div id="chatList" class="chat-list"></div>
      </section>

      <section id="chatView" class="chat-view hidden">
        <div class="chat-header">
          <button id="backBtn" class="back-btn" type="button">←</button>

          <div class="chat-profile">
            <div id="chatAvatar" class="avatar">WA</div>
            <div class="chat-meta">
              <h2 id="chatTitle">Chat</h2>
              <p id="chatMeta">Tap a chat</p>
            </div>
          </div>

          <div class="chat-actions">
            <button class="icon-btn" type="button" aria-label="Call">⌁</button>
            <button class="icon-btn" type="button" aria-label="Menu">⋮</button>
          </div>
        </div>

        <div id="messageArea" class="message-area">
          <div class="empty-state">Choose a chat to view messages.</div>
        </div>

        <form id="messageForm" class="composer">
          <button class="composer-btn" type="button">☺</button>
          <input id="messageInput" type="text" placeholder="Message" autocomplete="off" />
          <button class="composer-btn" type="button">📎</button>
          <button class="composer-btn" type="button">📷</button>
          <button class="send-btn" type="submit">➤</button>
        </form>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
